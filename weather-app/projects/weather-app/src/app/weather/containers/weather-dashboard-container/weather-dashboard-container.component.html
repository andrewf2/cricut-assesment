<div class="dashboard-sections">
  <lib-agent-chat
    [messages]="agentMessages()"
    [disabled]="agentLoading()"
    (sendMessage)="onAgentQuery($event)"
  />

  @if (isWeatherLoading()) {
    <lib-loading-skeleton />
  } @else if (weatherError()) {
    <lib-error-banner [message]="weatherError()" />
  } @else if (hasWeatherData()) {
    <div class="dashboard-weather">
      <div class="dashboard-toolbar">
        <lib-button (clicked)="onToggleUnit()">
          Switch to {{ temperatureUnit() === 'fahrenheit' ? '°C' : '°F' }}
        </lib-button>
      </div>

      @if (comparisonWeather()) {
        <div class="dashboard-comparison">
          <app-current-weather
            [weather]="currentWeather()"
            [city]="selectedCity()"
            [unit]="temperatureUnit()"
          />
          <app-current-weather
            [weather]="comparisonWeather()"
            [city]="comparisonCity()"
            [unit]="temperatureUnit()"
          />
        </div>
      } @else {
        <app-current-weather
          [weather]="currentWeather()"
          [city]="selectedCity()"
          [unit]="temperatureUnit()"
        />
      }

      @if (forecast().length > 0) {
        <app-forecast-list
          [forecast]="forecast()"
          [unit]="temperatureUnit()"
        />
      }
    </div>
  }
</div>
